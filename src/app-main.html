<template component="app-main">
  <link
    rel="component"
    href="https://sodium.static.apphor.de/code-editor.html"
  />
  <link
    rel="component"
    href="https://sodium.static.apphor.de/lucide-icon.html"
  />
  <link rel="component" href="/src/file-tree.html" />
  <link rel="component" href="/src/file-editor.html" />
  <div class="flex flex-col items-stretch w-screen h-screen">
    <header>
      <template if="profile">
        <div class="flex items-center justify-between">
          <form
            on-submit.prevent.stop="onLoadProject()"
            class="p-1 bg-gray-200 w-full block flex-grow flex items-center"
          >
            <input
              type="text"
              bind-value="projectName"
              on-change="setProjectName($event.target.value)"
              placeholder="Project name"
              class="w-full text-xs p-1 border rounded"
            />
            <button type="submit" class="p-1">
              <lucide-icon size="12" icon="folder-down"></lucide-icon>
            </button>
            <button type="button" class="p-1">
              <lucide-icon size="12" icon="cloud-upload" on-click="onUpload()"></lucide-icon>
            </button>
          </form>
          <div class="w-8">
            <a href="https://auth.api.apphor.de/me">
              <img
                bind-src="profile.photo || 'https://avatar.vercel.sh/me'"
                class="aspect-square h-8 w-8 rounded-full"
              />
            </a>
          </div>
        </div>
      </template>
      <template if="!profile">
        <div class="flex justify-end">
          <button class="p-2 bg-blue-400 text-white" on-click="signIn()">
            Sign In
          </button>
        </div>
      </template>
      <template if="error">
        <div class="text-red-400 font-bold text-xl p-2">
          {{ String(error) }}
        </div>
      </template>
    </header>
    <main class="flex flex-1 gap-2 w-full">
      <div class="w-1/4 flex flex-col h-full bg-gray-300 border-r">
        <file-tree
          class="h-full"
          on-select="onSelect($event)"
          bind-files="files"
        ></file-tree>
      </div>
      <div class="flex-1 h-full">
        <div class="w-full overflow-auto h-16 text-xs">
          <template for="file of openFiles">
            <div class="w-64 p-1 flex items-center">
              <span class="text-ellipsis whitespace-pre">{{ file.name }}</span>
              <span
                class="w-2 h-2 bg-white rounded-full"
                class-hidden="!file.modifled"
              ></span>
              <button class="w-2 h-2 tex" on-click="onClose(file)">
                &times;
              </button>
            </div>
          </template>
        </div>
        <template for="file of openFiles">
          <file-editor
            bind-file="file"
            on-content="onSetContent(file, $event.detail)"
          ></file-editor>
        </template>
      </div>
    </main>
  </div>
  <script setup src="/src/app-main.mjs"></script>
</template>
