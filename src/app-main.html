<template component="app-main">
  <link
    rel="component"
    href="https://sodium.static.apphor.de/code-editor.html"
  />
  <div class="flex flex-col items-start w-screen h-screen">
    <header class="h-4">
      <div class="flex h-4">
        <form on-submit.prevent.stop="onSubmit()">
          <input
            type="text"
            bind-value="projectName"
            on-change="setProjectName($event.target.value)"
            placeholder="Project name"
          />
          <input
            type="text"
            on-change="authorize($event.target.value)"
            placeholder="API key"
          />
          <button type="submit">Refresh</button>
        </form>
      </div>
      <template if="error">
        <div class="text-red-400 font-bold text-2xl p-2">
          {{ String(error) }}
        </div>
      </template>
    </header>
    <main class="flex flex-1 items-start">
      <div class="w-1/3 flex flex-col h-full">
        <template for="file of files">
          <button
            on-click="openFile(file)"
            class="p-2 w-full text-xs whitespace-pre text-ellipsis"
          >
            {{ file.name }}
          </button>
        </template>
      </div>
      <div class="w-2/3 h-full">
        <div class="p-2 text-xs bg-gray-200 flex justify-between items-center">
          <span>{{ selected?.name }}</span>
          <button on-click="setPreview(!showPreview)">toggle</button>
        </div>
        <code-editor
          bind-value="selected?.content"
          on-change="setContent($event.target.value)"
          class-hidden="showPreview"
          language="html"
        ></code-editor>
        <div
          class="bg-gray-100 p-2 w-full h-full"
          class-hidden="!showPreview"
          bind-inner-html="selected?.content"
        ></div>
      </div>
    </main>
  </div>
  <script setup src="/src/app-main.mjs"></script>
</template>
