<template component="app-main">
  <div class="flex items-center w-screen h-screen">
    <div class="flex">
      <input
        type="text"
        bind-value="projectName"
        on-change="setProjectName($event.target.value)"
        placeholder="Project name"
      />
      <input
        type="text"
        on-change="authorize($event.target.value)"
        placeholder="API key"
      />
    </div>
    <template if="error">
      <div class="text-red-400 font-bold text-2xl p-2">{{ String(error) }}</div>
    </template>
    <div class="w-1/3 flex flex-col">
      <template for="file of files">
        <button on-click="openFile(file)" class="p-2 w-full">
          {{ file.name }}
        </button>
      </template>
    </div>
    <div class="w-2/3">{{ selected?.content }}</div>
  </div>
</template>
