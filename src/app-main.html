<template component="app-main" shadow-dom="open">
  <link rel="stylesheet" href="https://wdn.homebots.io/tailwind.css" />
  <link
    rel="component"
    href="https://sodium.static.apphor.de/code-editor.html"
  />
  <link
    rel="component"
    href="https://sodium.static.apphor.de/lucide-icon.html"
  />
  <link rel="component" href="/src/file-tree.html" />
  <link rel="component" href="/src/file-editor.html" />
  <div class="flex flex-col items-stretch w-screen h-screen">
    <template if="!profile">
      <div class="flex items-center justify-center w-full h-full">
        <button on-click="signIn(true)">
          <lucide-icon
            icon="user"
            size="64"
            class="bg-gray-100 text-blue-600 p-4 block rounded-full"
          ></lucide-icon>
        </button>
      </div>
    </template>
    <template if="profile">
      <header class="flex items-center justify-between bg-gray-200 gap-1 p-1">
        <form
          on-submit.prevent.stop="onLoadProject()"
          class="w-full block flex-grow flex items-center"
        >
          <input
            type="text"
            bind-value="projectName"
            on-change="setProjectName($event.target.value)"
            placeholder="Project name"
            class="w-full text-xs p-1 border rounded"
          />
          <button type="submit" class="p-1">
            <lucide-icon size="12" icon="folder-down"></lucide-icon>
          </button>
          <button type="button" class="p-1">
            <lucide-icon
              size="12"
              icon="cloud-upload"
              on-click="onUpload()"
            ></lucide-icon>
          </button>
        </form>
        <div class="w-8">
          <a href="https://auth.api.apphor.de/me">
            <img
              bind-src="profile.photo || 'https://avatar.vercel.sh/me'"
              class="aspect-square h-8 w-8 rounded-full"
            />
          </a>
        </div>
      </header>

      <template if="error">
        <div class="text-red-400 font-bold text-xl p-2">
          {{ String(error) }}
        </div>
      </template>

      <main class="flex flex-1 gap-2 w-full bg-gray-100">
        <div class="w-1/4 flex flex-col h-full overflow-auto">
          <file-tree
            class="h-full contents"
            on-select="onOpen($event.detail)"
            bind-files="files"
          ></file-tree>
        </div>
        <div class="w-3/4 h-full">
          <div class="w-full overflow-auto h-6 text-xs flex" bind-files="files">
            <template for="file of openFiles">
              <div
                class="w-32 py-1 px-2 flex items-center justify-between border border-b-0 rounded gap-1"
                bind-class="{ 'bg-white': isSelected(file), 'bg-gray-100.opacity-90': !isSelected(file) }"
                bind-title="file.path"
                on-click="setSelected(file)"
              >
                <span class="whitespace-pre overflow-hidden block"
                  >{{ file.name }}</span
                >
                <span
                  class="w-2 h-2 bg-red-300 rounded-full"
                  class-hidden="!file.modifled"
                ></span>
                <button on-click.stop="onClose(file)">&times;</button>
              </div>
            </template>
          </div>
          <template for="file of openFiles">
            <file-editor
              bind-file="file"
              on-content="onSetContent(file, $event.detail)"
              class-hidden="!isSelected(file)"
            ></file-editor>
          </template>
        </div>
      </main>
    </template>
  </div>
  <script setup src="/src/app-main.mjs"></script>
</template>
