<template component="file-tree" shadow-dom="open">
  <link rel="stylesheet" href="https://wdn.homebots.io/tailwind.css" />
  <template for="entry of files">
    <div class="flex flex-col">
      <template if="entry.type === 'f'">
        <button
          on-click="onSelect(entry)"
          class="p-1 w-full text-xs text-left flex gap-1"
        >
          <lucide-icon size="12" icon="file"></lucide-icon>
          <span class="whitespace-pre overflow-hidden">{{ entry.name }}</span>
        </button>
      </template>
      <template if="entry.type === 'd'">
        <button
          on-click="toggleExpanded(entry.path)"
          class="p-1 w-full text-xs text-left whitespace-pre overflow-hidden flex gap-1"
        >
          <lucide-icon size="12" icon="folder"></lucide-icon>
          <span class="whitespace-pre overflow-hidden">{{ entry.name }}</span>
        </button>
        <template if="expanded.includes(entry.path)">
          <file-tree
            class="ml-4"
            bind-files="entry.files"
            on-select="onSelect(entry)"
          ></file-tree>
        </template>
      </template>
    </div>
  </template>
  <script setup src="/src/file-tree.mjs"></script>
</template>
